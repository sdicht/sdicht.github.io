site_name: Teacher Pedro
site_url: https://yourdomain.com  # Change to your real domain

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: amber
    - scheme: slate
      primary: teal
      accent: amber
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.annotate
    - content.tabs.link

nav:
  - Home: index.md
  -  English Literature 1:
      - Home: lit1/index.md
      - Syllabus: lit1/syllabus.md
      - Readings: lit1/readings/
      - Assignments: lit1/assignments/
      - Slides: lit1/slides/
  - English Literature 5:
      - Home: lit5/index.md
      - Syllabus: lit5/syllabus.md
      - Materials: lit5/materials.md
      - Assignments: lit5/assignments.md