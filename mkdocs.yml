site_name: Teacher Pedro
site_url: https://www.phsg.com.br  # Change to your real domain

markdown_extensions:
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: amber
    - scheme: slate
      primary: teal
      accent: amber
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.annotate
    - content.tabs.link

nav:
  - Home: index.md
  -  English Literature 1:
      - Home: lit1/index.md
      - Syllabus: lit1/syllabus.md
      - Materials: lit1/materials.md
      - Assignments: lit1/assignments.md
  - English Literature 5:
      - Home: lit5/index.md
      - Syllabus: lit5/syllabus.md
      - Materials: lit5/materials.md
      - Assignments: lit5/assignments.md